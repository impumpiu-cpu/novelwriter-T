services:
  scngs:
    build: .
    ports:
      # По умолчанию слушаем только localhost: режим selfhost приватен из коробки.
      - "127.0.0.1:8000:8000"
    volumes:
      - scngs-data:/data
    environment:
      - DEPLOY_MODE=selfhost
      - DATABASE_URL=sqlite:////data/scngs.db
      - SCNGS_DATA_DIR=/data
  scngs-worker:
    build: .
    command: ["sh", "-c", "python -m app.selfhost_db_bootstrap && python -m app.workers.background_jobs"]
    volumes:
      - scngs-data:/data
    environment:
      - DEPLOY_MODE=selfhost
      - DATABASE_URL=sqlite:////data/scngs.db
      - SCNGS_DATA_DIR=/data
    depends_on:
      - scngs
volumes:
  scngs-data:
