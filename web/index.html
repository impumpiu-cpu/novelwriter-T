<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NovWr - Continue Your Story</title>
  </head>
  <body>
    <!-- Prevent theme flash: default to light on first visit, otherwise respect the saved choice -->
    <script>
      try {
        var savedTheme = localStorage.getItem('novwr_theme');
        var t = savedTheme === 'dark' ? 'dark' : 'light';
        if (t === 'light') document.documentElement.classList.add('light');
        document.documentElement.style.colorScheme = t;
      } catch (e) {}
    </script>
    <script>
      try {
        var savedLocale = localStorage.getItem('novwr_ui_locale');
        var normalizedLocale = savedLocale === 'en' ? 'en' : savedLocale === 'zh' ? 'zh-CN' : null;
        if (normalizedLocale) {
          document.documentElement.lang = normalizedLocale;
          document.documentElement.dataset.uiLocale = normalizedLocale === 'en' ? 'en' : 'zh';
        }
      } catch (e) {}
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
